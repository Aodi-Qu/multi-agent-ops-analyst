<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Multi-Agent Ops Analyst</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;padding:20px}
.container{max-width:1200px;margin:0 auto}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:24px 32px;border-radius:12px;margin-bottom:20px}
.header h1{font-size:22px;font-weight:600}
.header p{font-size:13px;opacity:.85;margin-top:4px}
.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar textarea{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;resize:none;height:52px;transition:border .2s}
.search-bar textarea:focus{outline:none;border-color:#667eea}
.search-bar button{padding:0 28px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.search-bar button:hover{opacity:.9}
.search-bar button:disabled{opacity:.5;cursor:not-allowed}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h3{font-size:14px;font-weight:600;color:#667eea;margin-bottom:10px;display:flex;align-items:center;gap:6px}

#events{max-height:320px;overflow-y:auto;font-size:13px;line-height:1.6}
.event{padding:4px 8px;margin:2px 0;border-radius:4px;animation:fadeIn .3s}
.event.status{color:#555;border-left:3px solid #90caf9}
.event.result{background:#e8f5e9;border-left:3px solid #4caf50;padding:8px}
.event.error{background:#ffebee;border-left:3px solid #f44336}
.event.interrupt{background:#fff3e0;border-left:3px solid #ff9800}
.event.debug{color:#999;font-size:11px;border-left:3px solid #ccc}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.charts-wrap{display:flex;flex-wrap:wrap;gap:12px}
.chart-box{flex:1;min-width:260px;min-height:200px;position:relative}
.chart-box .chart-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:11px;color:#888;white-space:nowrap}

#report{display:none}
#report.show{display:block}
#report .content{padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:600px;overflow-y:auto}
#report .content h1{font-size:18px;margin:16px 0 8px;color:#1a1a2e}
#report .content h2{font-size:15px;margin:12px 0 6px;color:#333}
#report .content table{border-collapse:collapse;width:100%;margin:8px 0;font-size:12px}
#report .content td,#report .content th{border:1px solid #ddd;padding:6px 10px;text-align:left}
#report .content th{background:#f5f5f5;font-weight:600}

.tip{text-align:center;color:#888;font-size:13px;padding:30px 0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #e0e0e0;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Multi-Agent Ops Analyst</h1>
    <p>自然语言运维分析引擎 · LangGraph + FastAPI + 向量知识库</p>
  </div>

  <div class="search-bar">
    <textarea id="question" placeholder='例如：哪个产品的销售额最高&#10;各产品线营收趋势如何&#10;运营考核标准是什么'>智能手机营收趋势</textarea>
    <button id="submitBtn" onclick="invoke()">🔍 分析</button>
  </div>

  <div class="grid">
    <div class="card" style="grid-column:1">
      <h3>⏱ 执行状态</h3>
      <div id="events"><div class="tip">输入问题后点击分析</div></div>
    </div>
    <div class="card" style="grid-column:2">
      <h3>📈 数据可视化</h3>
      <div class="charts-wrap" id="charts"><div class="tip">分析完成后将自动生成图表</div></div>
    </div>
  </div>

  <div class="card" id="report">
    <h3>📋 分析报告</h3>
    <div class="content" id="reportContent"></div>
  </div>
</div>

<script>
let chartInstances = {};

function log(type, msg) {
  const el = document.getElementById("events");
  if (el.querySelector(".tip")) el.innerHTML = "";
  const d = document.createElement("div");
  d.className = "event " + type;
  d.innerHTML = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function safeGet(obj, key, def) {
  if (!obj) return def;
  if (obj[key] !== undefined) return obj[key];
  return def;
}

function renderCharts(sqlResult) {
  const wrap = document.getElementById("charts");
  // Destroy old charts
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartInstances = {};

  if (!sqlResult || sqlResult.length === 0) {
    wrap.innerHTML = '<div class="tip">该查询无结构化数据，无法展示图表</div>';
    return;
  }

  try {
    log("debug", "📊 数据行数: " + sqlResult.length);

    // Detect available numeric fields from first row
    const sample = sqlResult[0];
    const numericFields = ["revenue", "cost", "active_users"].filter(f => sample[f] !== undefined);

    if (numericFields.length === 0) {
      wrap.innerHTML = '<div class="tip">数据中无可识别的数值字段</div>';
      return;
    }

    // Group by product_line
    const byProduct = {};
    sqlResult.forEach(r => {
      const pl = r.product_line || r.product || "未知";
      if (!byProduct[pl]) byProduct[pl] = [];
      byProduct[pl].push(r);
    });

    const labels = Object.keys(byProduct);
    log("debug", "📊 产品线: " + labels.join(", "));

    const colors = ["#667eea","#764ba2","#4caf50","#ff9800","#f44336","#00bcd4","#9c27b0"];

    wrap.innerHTML = "";

    // Chart 1: Aggregated bar (all numeric fields)
    if (labels.length > 0) {
      const c1 = document.createElement("div");
      c1.className = "chart-box";
      c1.innerHTML = '<canvas></canvas><div class="chart-label">各产品线汇总对比</div>';
      wrap.appendChild(c1);
      const ctx1 = c1.querySelector("canvas").getContext("2d");

      const datasets = numericFields.map((f, i) => {
        const vals = labels.map(pl => {
          const rows = byProduct[pl] || [];
          if (f === "active_users") {
            // Average for user counts
            return Math.round(rows.reduce((s, r) => s + safeGet(r, f, 0), 0) / rows.length);
          }
          // Sum for revenue/cost
          return rows.reduce((s, r) => s + safeGet(r, f, 0), 0);
        });
        return {
          label: { revenue: "营收 (元)", cost: "成本 (元)", active_users: "活跃用户" }[f] || f,
          data: vals,
          backgroundColor: [colors[i % colors.length] + "cc", colors[(i+1) % colors.length] + "99"][i] || colors[i % colors.length] + "88"
        };
      });

      chartInstances.bar = new Chart(ctx1, {
        type: "bar",
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 11 } } } },
          scales: {
            y: { beginAtZero: true, ticks: { callback: v => v >= 10000 ? (v/10000).toFixed(0) + "万" : v } }
          }
        }
      });
    }

    // Chart 2: Pie for the primary field (revenue or first available)
    const primaryField = numericFields.includes("revenue") ? "revenue" : numericFields[0];
    if (labels.length > 1) {
      const c2 = document.createElement("div");
      c2.className = "chart-box";
      c2.innerHTML = '<canvas></canvas><div class="chart-label">' +
        ({ revenue: "营收占比", cost: "成本占比", active_users: "用户占比" }[primaryField] || primaryField) +
        '</div>';
      wrap.appendChild(c2);
      const ctx2 = c2.querySelector("canvas").getContext("2d");

      const pieData = labels.map(pl => {
        const rows = byProduct[pl] || [];
        if (primaryField === "active_users") {
          return Math.round(rows.reduce((s, r) => s + safeGet(r, primaryField, 0), 0) / rows.length);
        }
        return rows.reduce((s, r) => s + safeGet(r, primaryField, 0), 0);
      });

      chartInstances.doughnut = new Chart(ctx2, {
        type: "doughnut",
        data: {
          labels,
          datasets: [{ data: pieData, backgroundColor: colors.slice(0, labels.length) }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 11 } } },
            tooltip: { callbacks: {
              label: ctx => {
                const total = ctx.dataset.data.reduce((a,b) => a + b, 0);
                const pct = ((ctx.raw / total) * 100).toFixed(1);
                const val = ctx.raw >= 10000 ? (ctx.raw / 10000).toFixed(1) + "万" : ctx.raw.toFixed(0);
                return ctx.label + ": " + val + " (" + pct + "%)";
              }
            }}
          }
        }
      });
    }

    log("debug", "✅ 图表渲染完成");

  } catch (e) {
    log("error", "📊 图表渲染失败: " + e.message + " (" + e.stack?.slice(0,100) + ")");
    wrap.innerHTML = '<div class="tip">图表渲染出错，请查看事件日志</div>';
  }
}

async function invoke() {
  const btn = document.getElementById("submitBtn");
  const q = document.getElementById("question").value.trim();
  if (!q) return alert("请输入问题");
  btn.disabled = true;
  btn.textContent = "⏳ 分析中";

  document.getElementById("events").innerHTML = "";
  document.getElementById("charts").innerHTML = '<div class="tip">等待数据...</div>';
  document.getElementById("report").classList.remove("show");

  try {
    log("status", "<span class=\"spinner\"></span>发起查询...");
    const r = await fetch("/api/v1/invoke", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({question: q})
    });
    const data = await r.json();
    const tid = data.thread_id;
    log("status", "✅ thread_id: <code>" + tid + "</code>");
    log("status", "<span class=\"spinner\"></span>连接 SSE 流...");

    const es = new EventSource("/api/v1/stream/" + tid);

    es.addEventListener("status", function(e) {
      log("status", e.data);
    });

    es.addEventListener("result", function(e) {
      try {
        const d = JSON.parse(e.data);
        log("result", "✅ 分析完成，报告 " + (d.report ? (d.report.length + " 字") : "空"));

        // Charts
        if (d.sql_result && d.sql_result.length > 0) {
          log("debug", "📊 sql_result 行数: " + d.sql_result.length);
          log("debug", "📊 字段: " + Object.keys(d.sql_result[0]).join(", "));
          renderCharts(d.sql_result);
        } else {
          document.getElementById("charts").innerHTML = '<div class="tip">该查询无结构化数据可展示图表</div>';
        }

        // Report text
        const rep = document.getElementById("report");
        const repC = document.getElementById("reportContent");
        if (d.report) {
          repC.textContent = d.report;
          rep.classList.add("show");
          setTimeout(() => rep.scrollIntoView({ behavior: "smooth", block: "start" }), 200);
        }
      } catch(e) {
        log("error", "解析结果失败: " + e.message);
      }
      es.close();
      btn.disabled = false;
      btn.textContent = "🔍 分析";
    });

    es.addEventListener("interrupt", function(e) {
      log("interrupt", "✋ " + e.data);
      log("status", '💡 使用命令恢复: <code>Invoke-RestMethod ... -Body \'{"command":"ignore"}\'</code>');
    });

    es.addEventListener("error", function(e) {
      log("error", "❌ " + (e.data || "连接断开"));
      es.close();
      btn.disabled = false;
      btn.textContent = "🔍 分析";
    });

  } catch(e) {
    log("error", "❌ 请求失败: " + e.message);
    btn.disabled = false;
    btn.textContent = "🔍 分析";
  }
}
</script>
</body>
</html>
